name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm run test:unit

# E2E runners (`npm test`, `npm run test:no-pro`) are not gated here
# because they need a live Comet browser session and a signed-in
# Perplexity account.
